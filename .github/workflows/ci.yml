name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:

permissions:
  # In order to check out the repository.
  contents: read

jobs:
  lint:
    name: "Lint & Packaging"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.x"

      - name: "Install dependencies"
        run: |
          set -xe
          python -VV
          python -m site
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade tox
      - name: "Run tox lint targets for ${{ matrix.python-version }}"
        run: "python -m tox -e check_isort,pep8,packaging"

  build:
    # This is similar to the job in `release.yml`, but it does NOT upload to PyPI.
    # We include it here to reduce the likelihood of someone publishing a release
    # which doesn't build.
    name: "Build and check Python package"
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.x"

      - name: "Install packaging tools"
        run: "python -m pip install --upgrade build twine"

      - name: "Build dist package"
        run: "python -m build"

      - name: "Run twine checks"
        run: "python -m twine check dist/*"


  tests:
    needs: lint
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "${{ matrix.python-version }}"

      - name: "Install dependencies"
        run: |
          set -xe
          python -VV
          python -m site
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade tox
      - name: "Run tox targets for ${{ matrix.python-version }}"
        run: "python -m tox -e py"

